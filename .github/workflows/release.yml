name: Release

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: "ubuntu-latest"
    name: Validate for release
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"
        
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands"
          
      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"
        
  release:
    runs-on: "ubuntu-latest"
    needs: validate
    name: Update release info
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"
        # Check out the real branch, not the tag: the release event leaves the
        # runner in detached HEAD, from which a push to main cannot resolve
        # (the ad-m push action failed exactly here). `ref: main` puts us on a
        # real branch so the sync commit below can push.
        with:
          ref: main

      - name: Sync version strings to the tag (push only if changed)
        # The device sw_version and the card version are derived from the
        # manifest at runtime, so only two static strings need syncing: the
        # manifest itself and pyproject (kept equal by the CI consistency check).
        # Releases are cut from a commit that already carries the bumped version,
        # so this is normally a no-op — guard the commit/push on an actual diff
        # so a nothing-to-push release does not fail the workflow.
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" custom_components/battery_manager/manifest.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/battery_manager/manifest.json pyproject.toml
          if git diff --staged --quiet; then
            echo "manifest/pyproject already at $VERSION — nothing to sync."
          else
            git commit -m "Update version to $VERSION"
            git push origin HEAD:main
          fi
