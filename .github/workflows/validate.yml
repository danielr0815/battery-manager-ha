name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    name: HACS Validation
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: "brands"

  validate-hassfest:
    runs-on: "ubuntu-latest"
    name: Hassfest Validation
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Hassfest validation
        uses: "home-assistant/actions/hassfest@master"

  lint:
    runs-on: "ubuntu-latest"
    name: Lint (ruff)
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check custom_components tests

      - name: Ruff format check
        run: ruff format --check .

      - name: Version consistency (manifest == pyproject)
        run: |
          python - <<'PY'
          import json, re, pathlib
          mf = json.loads(pathlib.Path(
              "custom_components/battery_manager/manifest.json").read_text())["version"]
          pp = re.search(r'^version\s*=\s*"([^"]+)"',
                         pathlib.Path("pyproject.toml").read_text(), re.M).group(1)
          assert mf == pp, f"version drift: manifest {mf} != pyproject {pp}"
          print("version OK:", mf)
          PY

  tests:
    runs-on: "ubuntu-latest"
    name: Tests (pytest)
    steps:
      - name: Checkout
        uses: "actions/checkout@v4"

      - name: Set up Python
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant pytest pytest-homeassistant-custom-component

      - name: Run test suite
        run: python -m pytest tests -q
